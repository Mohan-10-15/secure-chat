<!DOCTYPE html>
<html>
<head>
    <title>🛕 தமிழ் அரட்டை</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
</head>

<body>

<div class="header">🛕 தமிழ் பாதுகாப்பான அரட்டை</div>

<div id="login">
    <input id="username" placeholder="பெயர்">
    <input id="room" placeholder="Room ID">
    <button onclick="login()">உள் நுழை</button>
</div>

<div id="chat-container" style="display:none;">
    <div id="chat"></div>

    <div class="input-box">
        <input id="msg" placeholder="செய்தி...">
        <button onclick="sendMessage()">அனுப்பு</button>
    </div>
</div>

<script src="/static/app.js"></script>
<script src="/static/floating.js"></script>

</body>
</html>
