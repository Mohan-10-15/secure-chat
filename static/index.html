<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<title>🔐 தமிழ் பாதுகாப்பான உரையாடல்</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Tamil&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="header">🛡️ தமிழ் பாதுகாப்பான உரையாடல்</div>

<div id="login">
    <input id="username" placeholder="உங்கள் பெயர்">
    <button onclick="login()">நுழைய</button>
</div>

<div id="chat-container" style="display:none;">
    <div id="chat"></div>
    <div class="input-box">
        <input id="msg" placeholder="செய்தி இங்கே...">
        <button onclick="sendMessage()">அனுப்பு</button>
    </div>
</div>

<script src="app.js"></script>
<script src="floating.js"></script>
</body>
</html>
